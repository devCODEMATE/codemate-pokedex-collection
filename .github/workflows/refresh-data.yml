name: Refresh TCGdex data

on:
  schedule:
    # Corre el día 1 de cada mes a las 06:00 UTC (03:00 hora Argentina)
    - cron: '0 6 1 * *'
  workflow_dispatch: # también se puede disparar a mano desde la pestaña "Actions" en GitHub

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch English catalog
        run: node scripts/fetch-tcgdex.js --lang=en

      - name: Build English indices
        run: node scripts/build-indices.js --lang=en

      - name: Fetch Spanish catalog
        run: node scripts/fetch-tcgdex.js --lang=es

      - name: Build Spanish indices
        run: node scripts/build-indices.js --lang=es

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No hay cambios en el catálogo, no se hace commit."
          else
            git commit -m "chore: refresh TCGdex catalog (auto)"
            git push
          fi